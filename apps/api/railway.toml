[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @puckflow/api build"
watchPatterns = ["/apps/api/**", "/packages/core/**", "/packages/db/**", "/package.json", "/pnpm-lock.yaml", "/pnpm-workspace.yaml", "/turbo.json"]

[deploy]
preDeployCommand = "pnpm --filter @puckflow/db migrate"
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/health/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
