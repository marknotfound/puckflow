[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @puckflow/web build"
watchPatterns = ["/apps/web/**", "/packages/api-client/**", "/packages/core/**", "/packages/ui-tokens/**", "/package.json", "/pnpm-lock.yaml", "/pnpm-workspace.yaml", "/turbo.json"]

[deploy]
startCommand = "pnpm --filter @puckflow/web start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
