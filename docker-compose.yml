services:
  postgres:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_DB: puckflow
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - puckflow-postgres:/var/lib/postgresql/data
      - ./tooling/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d puckflow']
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  puckflow-postgres:
